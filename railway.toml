[build]
builder = "RAILPACK"
buildCommand = "python -m pip install --upgrade pip && python -m pip install -r requirements.txt && python -m pip install -e \".[default]\""
watchPatterns = ["yt-dlp-master/**", "railway.toml", "requirements.txt", "pyproject.toml", "local_downloader_server.py"]

[deploy]
startCommand = "python local_downloader_server.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
